<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f6f2ea" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Düello" />
<title>Çiftler Düellosu</title>
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/ikon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --zemin: #f6f2ea;
    --kart: #ffffff;
    --kart-2: #f1ebdf;
    --cizgi: #e8e0d1;
    --cizgi-2: #d7ccb9;
    --metin: #241d13;
    --soluk: #8f8370;
    --vurgu: #a67c34;        /* bronz */
    --koyu: #241d13;         /* birincil buton */
    --koyu-metin: #f6f2ea;
    --yesil: #44795d;
    --sari: #a67c34;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Manrope", -apple-system, system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--zemin);
    color: var(--metin);
    font: 15px/1.55 var(--sans);
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #uygulama { width: 100%; max-width: 460px; padding: 26px 20px 44px; }

  h1 { font: 500 30px/1.2 var(--serif); margin: 0 0 8px; letter-spacing: 0.2px; }
  h2 { font: 500 23px/1.25 var(--serif); margin: 0 0 6px; }
  p.alt { color: var(--soluk); margin: 0 0 24px; font-size: 14px; }

  .kart { background: var(--kart); border: 1px solid var(--cizgi); border-radius: 16px; padding: 20px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(36,29,19,.04); }

  label { display: block; font-size: 11px; color: var(--soluk); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; }
  input[type=text] {
    width: 100%; padding: 14px 15px; font-size: 16px; font-family: var(--sans);
    background: var(--kart); color: var(--metin);
    border: 1px solid var(--cizgi-2); border-radius: 12px; outline: none;
    transition: border-color .15s;
  }
  input[type=text]:focus { border-color: var(--vurgu); }
  input.kod { text-transform: uppercase; letter-spacing: 5px; text-align: center; font-size: 21px; font-weight: 600; }

  button {
    width: 100%; padding: 15px; font: 700 13.5px/1 var(--sans); letter-spacing: 0.8px;
    background: var(--koyu); color: var(--koyu-metin); border: 0; border-radius: 12px;
    cursor: pointer; margin-top: 10px; text-transform: uppercase;
    transition: opacity .15s;
  }
  button:disabled { opacity: .4; cursor: default; }
  button.ikincil { background: transparent; color: var(--soluk); border: 1px solid var(--cizgi-2); }

  .ayrac { text-align: center; color: var(--soluk); font-size: 13px; margin: 20px 0; }

  .ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; color: var(--soluk); }
  .rozet { background: var(--kart); border: 1px solid var(--cizgi); border-radius: 99px; padding: 6px 14px; letter-spacing: 0.4px; }
  .premium-etiket { color: var(--vurgu); font-size: 10px; font-weight: 700; letter-spacing: 1.6px; text-transform: uppercase; }

  .ilerleme { display: flex; gap: 5px; margin-bottom: 22px; }
  .ilerleme i { flex: 1; height: 3px; border-radius: 99px; background: var(--cizgi-2); }
  .ilerleme i.dolu { background: var(--vurgu); }

  .soru { font: 500 25px/1.35 var(--serif); margin: 0 0 22px; }

  .sik {
    display: block; width: 100%; text-align: left; padding: 16px 17px;
    background: var(--kart); border: 1px solid var(--cizgi-2); border-radius: 13px;
    color: var(--metin); font: 500 15px/1.4 var(--sans); letter-spacing: 0; text-transform: none;
    margin: 0 0 10px; cursor: pointer; transition: border-color .15s;
  }
  .sik:active { border-color: var(--vurgu); }

  .kod-kutu { text-align: center; padding: 26px 18px; }
  .kod-kutu .kod { font: 600 34px/1 var(--serif); letter-spacing: 8px; color: var(--vurgu); margin: 10px 0 8px; padding-left: 8px; }

  .bekle { text-align: center; padding: 44px 20px; color: var(--soluk); }
  .nokta { display: inline-block; width: 5px; height: 5px; border-radius: 99px; background: var(--soluk); margin: 0 3px; animation: zipla 1.2s infinite; }
  .nokta:nth-child(2) { animation-delay: .15s; }
  .nokta:nth-child(3) { animation-delay: .3s; }
  @keyframes zipla { 0%, 60%, 100% { opacity: .2 } 30% { opacity: 1 } }

  .satir { border-bottom: 1px solid var(--cizgi); padding: 16px 0; }
  .satir:first-child { padding-top: 2px; }
  .satir:last-child { border-bottom: 0; padding-bottom: 2px; }
  .satir .s { font: 500 15px/1.4 var(--serif); margin-bottom: 10px; }
  .cift { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kutu { background: var(--kart-2); border-radius: 10px; padding: 10px 12px; }
  .kutu .k { font-size: 10px; color: var(--soluk); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; margin-bottom: 4px; }
  .kutu .d { font-size: 14px; line-height: 1.4; }
  .isaret { font-size: 12.5px; font-weight: 600; margin-top: 9px; }
  .tam { color: var(--yesil); }
  .yakin { color: var(--sari); }
  .uzak { color: var(--soluk); }

  .skor { display: flex; gap: 10px; margin-bottom: 14px; }
  .skor > div { flex: 1; background: var(--kart); border: 1px solid var(--cizgi); border-radius: 14px; padding: 16px 14px; text-align: center; }
  .skor .ad { font-size: 11px; color: var(--soluk); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 700; }
  .skor .p { font: 600 32px/1.1 var(--serif); margin-top: 4px; }

  .hata { background: #f7e5df; border: 1px solid #e5c3b6; color: #7c3b26; padding: 12px 14px; border-radius: 12px; font-size: 13.5px; margin-bottom: 14px; }
  .bilgi { background: #e9efe7; border: 1px solid #c9d8c8; color: #3c5c46; padding: 12px 14px; border-radius: 12px; font-size: 13.5px; margin-bottom: 14px; }

  /* ── ikonlar ── */
  .ikn { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; flex: none; }
  .ikn-kucuk { width: 15px; height: 15px; }

  /* ── menü ── */
  .menu-kart { display: flex; align-items: center; gap: 15px; cursor: pointer; transition: border-color .15s; }
  .menu-kart:active { border-color: var(--cizgi-2); }
  .menu-kart .ikon-cerceve {
    width: 42px; height: 42px; border-radius: 12px; flex: none;
    border: 1px solid var(--cizgi); background: var(--kart-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--vurgu);
  }
  .menu-kart .govde { flex: 1; min-width: 0; }
  .menu-kart .baslik { font-weight: 700; font-size: 15.5px; letter-spacing: 0.1px; }
  .menu-kart .aciklama { font-size: 13px; color: var(--soluk); margin-top: 2px; }
  .menu-kart .sag { flex: none; color: var(--soluk); display: flex; align-items: center; }
  .menu-kart .sag.aktif { color: var(--vurgu); }
  .menu-kart .sag.tamam { color: var(--yesil); }
  .gunluk-kart { background: linear-gradient(135deg, #ffffff 55%, #f6ecd9); }
  .seri { color: var(--vurgu); font-weight: 700; }
  .bolum-baslik { font-size: 11px; color: var(--soluk); text-transform: uppercase; letter-spacing: 1.6px; font-weight: 700; margin: 26px 2px 10px; }

  /* ── premium duvarı ── */
  .duvar { text-align: center; padding: 26px 6px 0; }
  .duvar .amblem {
    width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 99px;
    border: 1px solid var(--cizgi-2); background: var(--kart);
    display: flex; align-items: center; justify-content: center;
    color: var(--vurgu);
  }
  .duvar .amblem .ikn { width: 26px; height: 26px; }
  .duvar ul { text-align: left; font-size: 14px; line-height: 1.5; padding: 0; list-style: none; margin: 4px 0 18px; }
  .duvar ul li { display: flex; gap: 11px; align-items: center; padding: 9px 0; }
  .duvar ul li .ikn-kucuk { color: var(--yesil); }
  .duvar .not { font-size: 12px; color: var(--soluk); margin-top: 12px; }

  /* ── davet karşılama ── */
  .davet-karsilama { text-align: center; padding: 40px 6px 0; }
  .davet-karsilama .amblem {
    width: 64px; height: 64px; margin: 0 auto 20px; border-radius: 99px;
    border: 1px solid var(--cizgi-2); background: var(--kart);
    display: flex; align-items: center; justify-content: center; color: var(--vurgu);
  }
</style>
</head>
<body>
<div id="uygulama"></div>

<script>
const $ = document.getElementById("uygulama");
const kacis = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

// İnce çizgi ikonlar — emoji yok
const IKON = {
  gunes: '<svg class="ikn" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2.5v2.5M12 19v2.5M2.5 12H5M19 12h2.5M5 5l1.8 1.8M17.2 17.2L19 19M19 5l-1.8 1.8M6.8 17.2L5 19"/></svg>',
  duello: '<svg class="ikn" viewBox="0 0 24 24"><path d="M12 3l6.5 9L12 21l-6.5-9z"/><path d="M12 8.5l2.6 3.5-2.6 3.5-2.6-3.5z"/></svg>',
  ok: '<svg class="ikn ikn-kucuk" viewBox="0 0 24 24"><path d="M5 12h13M13 6.5l5.5 5.5-5.5 5.5"/></svg>',
  kilit: '<svg class="ikn ikn-kucuk" viewBox="0 0 24 24"><rect x="5.5" y="10.5" width="13" height="9" rx="2"/><path d="M8.5 10.5V8a3.5 3.5 0 0 1 7 0v2.5"/></svg>',
  kilitBuyuk: '<svg class="ikn" viewBox="0 0 24 24"><rect x="5.5" y="10.5" width="13" height="9" rx="2"/><path d="M8.5 10.5V8a3.5 3.5 0 0 1 7 0v2.5"/></svg>',
  tik: '<svg class="ikn ikn-kucuk" viewBox="0 0 24 24"><path d="M4.5 12.5l5 5L19.5 7"/></svg>',
  kalp: '<svg class="ikn" viewBox="0 0 24 24"><path d="M12 20.5S4 15 4 9.5A4.5 4.5 0 0 1 12 6.6a4.5 4.5 0 0 1 8 2.9c0 5.5-8 11-8 11z"/></svg>',
  paylas: '<svg class="ikn ikn-kucuk" viewBox="0 0 24 24"><path d="M12 3v12M8 6.5L12 3l4 3.5"/><path d="M5 12v7a1.5 1.5 0 0 0 1.5 1.5h11A1.5 1.5 0 0 0 19 19v-7"/></svg>',
};

let oturum = null;      // {kod, oyuncu, token}
let durum = null;       // sunucudan gelen durum
let indeks = 0;         // ekranda kaçıncı soru
let taslak = "";        // yazılan/seçilen cevap
let hata = "";
let bilgi = "";
let davetParam = new URLSearchParams(location.search).get("davet");
let davetEden = null;   // davet linkinden gelindiğinde davet edenin adı
let zamanlayici = null;

try { oturum = JSON.parse(localStorage.getItem("duello-oturum") || "null"); } catch {}

// ─────────────────────────────────────────── sunucu
async function istek(yol, secenekler = {}) {
  const ayirac = yol.includes("?") ? "&" : "?";
  const acikUc = yol.startsWith("/api/kur") || yol.startsWith("/api/katil") || yol.startsWith("/api/davet");
  const kimlik = oturum && !acikUc ? `${ayirac}kod=${oturum.kod}&oyuncu=${oturum.oyuncu}&token=${oturum.token}` : "";
  const y = await fetch(yol + kimlik, {
    method: secenekler.govde ? "POST" : "GET",
    headers: { "content-type": "application/json" },
    body: secenekler.govde ? JSON.stringify(secenekler.govde) : undefined,
  });
  const veri = await y.json();
  if (!y.ok) throw new Error(veri.hata || "Bir şeyler ters gitti.");
  return veri;
}

// Ekranı etkileyen şeylerin özeti. Değişmediyse yeniden çizmeyiz —
// yoksa eşin her cevabında input yeniden yaratılır, imleç kaybolur.
const ekranAnahtari = (d) =>
  d
    ? JSON.stringify([
        d.faz, d.aktif?.ad, d.esBitirdi, d.hazir, !!d.secenekler, d.es?.ad,
        d.premium, d.toplam, d.menu?.gunluk, d.menu?.duelloSeviye, d.menu?.paketler?.filter((p) => p.bitti).length,
      ])
    : "";

async function tazele() {
  if (!oturum) return;
  try {
    const yeni = await istek("/api/durum");
    if (durum && yeni.kod === durum.kod && yeni.v < durum.v) return; // geciken eski yanıt, çöpe
    const fazDegisti = !durum || durum.faz !== yeni.faz || durum.aktif?.ad !== yeni.aktif?.ad;
    const cizGerek = ekranAnahtari(durum) !== ekranAnahtari(yeni);
    durum = yeni;
    if (fazDegisti) { indeks = ilkBosSoru(); taslak = ""; }
    if (cizGerek) ciz();
  } catch (e) {
    oturum = null;
    localStorage.removeItem("duello-oturum");
    hata = e.message;
    ciz();
  }
}

function anketBaslat() {
  clearInterval(zamanlayici);
  zamanlayici = setInterval(tazele, 2000);
}

function ilkBosSoru() {
  if (!durum || !durum.aktif) return 0;
  const liste = durum.faz === "tahmin" ? durum.benimTahminlerim : durum.benimCevaplarim;
  for (let i = 0; i < durum.soruSayisi; i++) if (!liste?.[i]) return i;
  return durum.soruSayisi;
}

// ─────────────────────────────────────────── eylemler
async function odaKur(ad) {
  oturum = await istek("/api/kur", { govde: { ad } });
  localStorage.setItem("duello-oturum", JSON.stringify(oturum));
  await tazele();
  anketBaslat();
}

async function odayaKatil(govde) {
  oturum = await istek("/api/katil", { govde });
  localStorage.setItem("duello-oturum", JSON.stringify(oturum));
  history.replaceState({}, "", location.pathname); // linkteki daveti temizle
  davetParam = null;
  await tazele();
  anketBaslat();
}

async function davetPaylas() {
  const link = `${location.origin}${location.pathname}?davet=${durum.davet}`;
  const metin = `${durum.ben.ad} seni Çiftler Düellosu'na davet ediyor`;
  if (navigator.share) {
    try { await navigator.share({ title: "Çiftler Düellosu", text: metin, url: link }); return; }
    catch (e) { if (e.name === "AbortError") return; }
  }
  try {
    await navigator.clipboard.writeText(link);
    bilgi = "Davet linki kopyalandı. Eşine gönder.";
  } catch {
    prompt("Bu linki kopyalayıp eşine gönder:", link);
  }
  ciz();
}

async function baslat(tur, paketId) {
  try {
    durum = await istek("/api/baslat", { govde: { tur, paketId } });
    indeks = ilkBosSoru();
    taslak = "";
    ciz();
  } catch (e) { hata = e.message; ciz(); }
}

async function gonder() {
  if (!taslak.trim()) return;
  const yol = durum.faz === "tahmin" ? "/api/tahmin" : "/api/cevap";
  const gecici = taslak;
  taslak = "";
  try {
    durum = await istek(yol, { govde: { indeks, metin: gecici } });
    indeks = ilkBosSoru();
    ciz();
  } catch (e) { hata = e.message; taslak = gecici; ciz(); }
}

async function hazirim() {
  try { durum = await istek("/api/hazir", { govde: {} }); indeks = 0; taslak = ""; ciz(); }
  catch (e) { hata = e.message; ciz(); }
}

async function premiumAc() {
  try { durum = await istek("/api/premium", { govde: {} }); indeks = 0; taslak = ""; ciz(); }
  catch (e) { hata = e.message; ciz(); }
}

async function duvarKapat() {
  try { durum = await istek("/api/duvar-kapat", { govde: {} }); ciz(); }
  catch (e) { hata = e.message; ciz(); }
}

function cik() {
  localStorage.removeItem("duello-oturum");
  oturum = null; durum = null; clearInterval(zamanlayici); ciz();
}

// ─────────────────────────────────────────── ekranlar
function ciz() {
  const hataHtml = (hata ? `<div class="hata">${kacis(hata)}</div>` : "") + (bilgi ? `<div class="bilgi">${kacis(bilgi)}</div>` : "");
  hata = ""; bilgi = "";

  if (!oturum && davetParam) return davetEkrani(hataHtml);
  if (!oturum || !durum) return girisEkrani(hataHtml);
  if (durum.faz === "lobi") return lobiEkrani(hataHtml);
  if (durum.faz === "menu") return menuEkrani(hataHtml);
  if (durum.faz === "duvar") return duvarEkrani(hataHtml);
  if (durum.faz === "hazirlaniyor") return bekleEkrani("Hazırlanıyor", durum.aktif?.tip === "sik" ? "Eşinin cevaplarına göre şıklar üretiliyor." : "Cevaplar değerlendiriliyor.");
  if (durum.faz === "sonuc") return sonucEkrani(hataHtml);

  const bitti = indeks >= durum.soruSayisi;
  if (bitti) {
    const esBekleniyor = durum.faz === "tahmin" ? !durum.esBitirdi.tahmin : !durum.esBitirdi.cevap;
    if (esBekleniyor) {
      return bekleEkrani(
        `${durum.es?.ad ?? "Eşin"} henüz bitirmedi`,
        "Sen bitirdin. O da bitirince ekran kendiliğinden ilerleyecek."
      );
    }
    return bekleEkrani("Hazırlanıyor", "");
  }
  return soruEkrani(hataHtml);
}

// ── davet linkiyle gelen kişinin karşılama ekranı
function davetEkrani(hataHtml) {
  const baslik = davetEden
    ? `${kacis(davetEden)} seni davet etti`
    : "Davet kontrol ediliyor";
  $.innerHTML = `
    <div class="davet-karsilama">
      <div class="amblem">${IKON.kalp}</div>
      <h2>${baslik}</h2>
      <p class="alt">Birbirinizi ne kadar tanıyorsunuz? Her bölüm biraz daha derinleşiyor.</p>
    </div>
    ${hataHtml}
    ${davetEden ? `
    <div class="kart">
      <label>Adın</label>
      <input type="text" id="ad" placeholder="Adını yaz" autocomplete="given-name" />
      <button id="katilBtn">Katıl</button>
    </div>` : ""}`;

  const btn = document.getElementById("katilBtn");
  if (btn) btn.onclick = async (e) => {
    const ad = document.getElementById("ad").value.trim();
    if (!ad) return uyar("Önce adını yaz.");
    e.target.disabled = true;
    try { await odayaKatil({ davet: davetParam, ad }); }
    catch (err) {
      hata = err.message;
      davetParam = null; // link öldüyse normal girişe düş
      history.replaceState({}, "", location.pathname);
      ciz();
    }
  };
}

async function davetKontrol() {
  try {
    const veri = await istek(`/api/davet?token=${encodeURIComponent(davetParam)}`);
    davetEden = veri.davetEden;
  } catch (e) {
    hata = e.message;
    davetParam = null;
    history.replaceState({}, "", location.pathname);
  }
  ciz();
}

function girisEkrani(hataHtml) {
  $.innerHTML = `
    <h1>Çiftler Düellosu</h1>
    <p class="alt">Birbirinizi ne kadar tanıyorsunuz? Her bölüm biraz daha derinleşiyor.</p>
    ${hataHtml}
    <div class="kart">
      <label>Adın</label>
      <input type="text" id="ad" placeholder="Örn. Nurettin" autocomplete="given-name" />
      <button id="kurBtn">Yeni oyun kur</button>
    </div>
    <div class="ayrac">ya da eşin kod verdiyse</div>
    <div class="kart">
      <label>Oda kodu</label>
      <input type="text" id="kod" class="kod" maxlength="6" placeholder="······" autocapitalize="characters" autocomplete="off" />
      <button id="katilBtn" class="ikincil">Odaya katıl</button>
    </div>`;

  const adAl = () => document.getElementById("ad").value.trim();
  document.getElementById("kurBtn").onclick = async (e) => {
    if (!adAl()) return uyar("Önce adını yaz.");
    e.target.disabled = true;
    try { await odaKur(adAl()); } catch (err) { hata = err.message; ciz(); }
  };
  document.getElementById("katilBtn").onclick = async (e) => {
    const kod = document.getElementById("kod").value.trim();
    if (!adAl()) return uyar("Önce adını yaz.");
    if (kod.length !== 6) return uyar("6 haneli oda kodunu gir.");
    e.target.disabled = true;
    try { await odayaKatil({ kod, ad: adAl() }); } catch (err) { hata = err.message; ciz(); }
  };
}

const uyar = (m) => { hata = m; ciz(); };

function lobiEkrani(hataHtml) {
  $.innerHTML = `
    ${hataHtml}
    <div class="kart kod-kutu">
      <h2 style="margin-bottom:4px">Eşini davet et</h2>
      <p class="alt" style="margin-bottom:18px">Link tek kullanımlık — sadece onun için.</p>
      <button id="paylasBtn" style="display:flex;align-items:center;justify-content:center;gap:9px">${IKON.paylas} Davet linkini paylaş</button>
      <div class="ayrac">ya da bu kodu söyle</div>
      <div class="kod">${kacis(durum.kod)}</div>
    </div>
    <div class="bekle"><span class="nokta"></span><span class="nokta"></span><span class="nokta"></span><br><br>Eşin bekleniyor</div>
    <button class="ikincil" id="cikBtn">Vazgeç</button>`;
  document.getElementById("paylasBtn").onclick = davetPaylas;
  document.getElementById("cikBtn").onclick = cik;
}

// ── ana menü: günlük soru + düello + paketler
function menuEkrani(hataHtml) {
  const m = durum.menu;
  const esAd = durum.es?.ad ?? "eşin";
  const g = m.gunluk;

  const gunlukSag = g.bugunYapildi
    ? `<span class="sag tamam">${IKON.tik}</span>`
    : `<span class="sag aktif">${IKON.ok}</span>`;
  const gunlukAciklama = g.bugunYapildi
    ? (g.seri > 0 ? `<span class="seri">${g.seri} gün seri</span> · bugün tamamlandı` : "bugün tamamlandı")
    : g.seri > 0
    ? `<span class="seri">${g.seri} gün seri</span> · bugünün sorusu hazır`
    : "günde bir soru, seriyi başlatın";

  const duelloAciklama = m.duelloBitti
    ? "Beş bölüm bitti. Baştan oynayın — cevaplar değişti mi?"
    : `Bölüm ${m.duelloSeviye} · ${kacis(m.duelloAd)}${m.duelloSeviye >= 3 && !durum.premium ? " · Premium" : ""}`;

  const paketHtml = m.paketler
    .map((p) => {
      const kilitli = p.premium && !durum.premium;
      const sag = p.bitti
        ? `<span class="sag tamam">${IKON.tik}</span>`
        : kilitli
        ? `<span class="sag">${IKON.kilit}</span>`
        : `<span class="sag aktif">${IKON.ok}</span>`;
      return `
      <div class="kart menu-kart" data-paket="${p.id}">
        <div class="govde">
          <div class="baslik">${kacis(p.ad)}${p.premium ? ' <span class="premium-etiket" style="margin-left:6px">Premium</span>' : ""}</div>
          <div class="aciklama">${kacis(p.alt)}</div>
        </div>
        ${sag}
      </div>`;
    })
    .join("");

  $.innerHTML = `
    <div class="ust">
      <span class="rozet">${kacis(durum.ben.ad)} &amp; ${kacis(esAd)}</span>
      ${durum.premium ? '<span class="premium-etiket">Premium</span>' : ""}
    </div>
    ${hataHtml}
    <div class="skor">
      <div><div class="ad">${kacis(durum.ben.ad)}</div><div class="p">${durum.toplam[durum.ben.no]}</div></div>
      <div><div class="ad">${kacis(esAd)}</div><div class="p">${durum.toplam[1 - durum.ben.no]}</div></div>
    </div>

    <div class="kart menu-kart gunluk-kart" id="gunlukKart">
      <div class="ikon-cerceve">${IKON.gunes}</div>
      <div class="govde">
        <div class="baslik">Günün Sorusu</div>
        <div class="aciklama">${gunlukAciklama}</div>
      </div>
      ${gunlukSag}
    </div>

    <div class="bolum-baslik">Düello</div>
    <div class="kart menu-kart" id="duelloKart">
      <div class="ikon-cerceve">${IKON.duello}</div>
      <div class="govde">
        <div class="baslik">${m.duelloBitti ? "Yeniden oyna" : "Devam et"}</div>
        <div class="aciklama">${duelloAciklama}</div>
      </div>
      <span class="sag aktif">${IKON.ok}</span>
    </div>

    <div class="bolum-baslik">Paketler</div>
    ${paketHtml}`;

  document.getElementById("gunlukKart").onclick = () => baslat("gunluk");
  document.getElementById("duelloKart").onclick = () => baslat("duello");
  $.querySelectorAll("[data-paket]").forEach((k) => {
    k.onclick = () => baslat("paket", k.dataset.paket);
  });
}

// ── premium duvarı: merak en yüksekken gelir
function duvarEkrani(hataHtml) {
  $.innerHTML = `
    ${hataHtml}
    <div class="duvar">
      <div class="amblem">${IKON.kilitBuyuk}</div>
      <h2>Yüzeyi bitirdiniz</h2>
      <p class="alt">Buraya kadar herkes gelir. Bundan sonrası — varsayımlar, değerler,
      birbirinizin kırılgan tarafları — sadece derine inmeyi göze alanlara.</p>
      <div class="kart" style="text-align:left">
        <ul>
          <li>${IKON.tik} Düellonun 3, 4 ve 5. bölümleri</li>
          <li>${IKON.tik} Tüm soru paketleri</li>
          <li>${IKON.tik} Gelecek tüm yeni paketler</li>
        </ul>
        <button id="premiumBtn">Premium'u aç</button>
        <button class="ikincil" id="vazgecBtn">Şimdi değil</button>
        <div class="not">Prototip sürümü — şimdilik ücretsiz açılır.</div>
      </div>
    </div>`;
  document.getElementById("premiumBtn").onclick = (e) => { e.target.disabled = true; premiumAc(); };
  document.getElementById("vazgecBtn").onclick = duvarKapat;
}

function bekleEkrani(baslik, alt) {
  $.innerHTML = `
    ${ustHtml()}
    <div class="bekle">
      <span class="nokta"></span><span class="nokta"></span><span class="nokta"></span>
      <h2 style="margin-top:20px">${kacis(baslik)}</h2>
      <p class="alt" style="margin-top:8px">${kacis(alt)}</p>
    </div>`;
}

function ustHtml() {
  const a = durum.aktif;
  if (!a) return "";
  const rozet = a.tur === "duello" ? `Bölüm ${a.seviye} · ${a.ad}` : a.ad;
  const fazAd = durum.faz === "tahmin" ? "Tahmin" : durum.faz === "sonuc" ? "Yüzleşme" : "Kendi cevabın";
  return `<div class="ust">
    <span class="rozet">${kacis(rozet)}</span>
    <span>${kacis(fazAd)}</span>
  </div>`;
}

function soruEkrani(hataHtml) {
  const tahminMi = durum.faz === "tahmin";
  const soru = durum.sorular[indeks];
  const esAd = durum.es?.ad ?? "Eşin";

  const baslik = tahminMi
    ? `<p class="alt" style="margin-bottom:14px">${kacis(esAd)} bu soruya ne yazdı?</p>`
    : `<p class="alt" style="margin-bottom:14px">${kacis(durum.aktif.alt)}</p>`;

  const noktalar =
    durum.soruSayisi > 1
      ? `<div class="ilerleme">${Array.from({ length: durum.soruSayisi }, (_, i) => `<i class="${i < indeks ? "dolu" : ""}"></i>`).join("")}</div>`
      : "";

  let girisHtml;
  if (tahminMi && durum.aktif.tip === "sik" && durum.secenekler) {
    girisHtml = durum.secenekler[indeks]
      .map((s) => `<button class="sik" data-deger="${kacis(s)}">${kacis(s)}</button>`)
      .join("");
  } else {
    girisHtml = `
      <input type="text" id="cevap" placeholder="${tahminMi ? "Tahminini yaz" : "Cevabını yaz"}" autocomplete="off" value="${kacis(taslak)}" />
      <button id="ileriBtn">${indeks === durum.soruSayisi - 1 ? "Bitir" : "İleri"}</button>`;
  }

  $.innerHTML = `
    ${ustHtml()}
    ${noktalar}
    ${hataHtml}
    ${baslik}
    <div class="soru">${kacis(soru)}</div>
    ${girisHtml}`;

  if (tahminMi && durum.aktif.tip === "sik" && durum.secenekler) {
    $.querySelectorAll(".sik").forEach((b) => {
      b.onclick = () => { taslak = b.dataset.deger; gonder(); };
    });
  } else {
    const alan = document.getElementById("cevap");
    alan.oninput = () => { taslak = alan.value; };
    alan.onkeydown = (e) => { if (e.key === "Enter") gonder(); };
    document.getElementById("ileriBtn").onclick = gonder;
    alan.focus();
    alan.setSelectionRange(alan.value.length, alan.value.length); // imleç sona
  }
}

function sonucEkrani(hataHtml) {
  const s = durum.sonuc;
  const esAd = durum.es?.ad ?? "Eşin";
  const benAd = durum.ben.ad;
  const puanla = (kademeler) => (kademeler ?? []).reduce((t, k) => t + (k === "tam" ? 10 : k === "yakin" ? 5 : 0), 0);
  const puansiz = durum.aktif.tip === "acik";

  const isaretMetni = { tam: "Bildin", yakin: "Yaklaştın", uzak: "Bilemedin" };

  const satirlar = durum.sorular.map((soru, i) => {
    const benimKademe = s.benimKademelerim?.[i];
    const esinKademe = s.esinKademeleri?.[i];
    return `
      <div class="satir">
        <div class="s">${kacis(soru)}</div>
        <div class="cift">
          <div class="kutu">
            <div class="k">${kacis(benAd)}</div>
            <div class="d">${kacis(s.benimCevaplarim[i] || "—")}</div>
          </div>
          <div class="kutu">
            <div class="k">${kacis(esAd)}</div>
            <div class="d">${kacis(s.esinCevaplari[i] || "—")}</div>
          </div>
        </div>
        ${puansiz ? "" : `
        <div class="isaret ${benimKademe}">
          Senin tahminin: “${kacis(s.benimTahminlerim[i] || "—")}” · ${isaretMetni[benimKademe] ?? ""}
        </div>
        <div class="isaret ${esinKademe}">
          ${kacis(esAd)} seni tahmin etti: “${kacis(s.esinTahminleri[i] || "—")}” · ${isaretMetni[esinKademe] ?? ""}
        </div>`}
      </div>`;
  }).join("");

  const skorHtml = puansiz ? "" : `
    <div class="skor">
      <div><div class="ad">${kacis(benAd)}</div><div class="p">${puanla(s.benimKademelerim)}</div></div>
      <div><div class="ad">${kacis(esAd)}</div><div class="p">${puanla(s.esinKademeleri)}</div></div>
    </div>`;

  const beklemede = durum.hazir?.[durum.ben.no] && !durum.hazir?.[1 - durum.ben.no];

  const altYazi = durum.aktif.tur === "gunluk"
    ? "Seri sürüyor. İştah açıldıysa menüde bir bölüm sizi bekliyor."
    : durum.aktif.alt;

  $.innerHTML = `
    ${ustHtml()}
    ${hataHtml}
    <h2>${puansiz ? "Yüzleşme" : durum.aktif.tur === "gunluk" ? "Bugünlük bu kadar" : "Bölüm bitti"}</h2>
    <p class="alt">${kacis(altYazi)}</p>
    ${skorHtml}
    <div class="kart">${satirlar}</div>
    ${beklemede
      ? `<div class="bekle" style="padding:16px">${kacis(esAd)} hazır olunca menüye dönülecek</div>`
      : `<button id="hazirBtn">Devam</button>`}`;

  const btn = document.getElementById("hazirBtn");
  if (btn) btn.onclick = () => { btn.disabled = true; hazirim(); };
}

// ─────────────────────────────────────────── başlat
if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
if (oturum) {
  history.replaceState({}, "", location.pathname); // zaten oyundayken davet linki yok sayılır
  davetParam = null;
  tazele().then(anketBaslat);
} else if (davetParam) {
  ciz();          // "kontrol ediliyor"
  davetKontrol(); // sonra "X seni davet etti"
} else {
  ciz();
}
</script>
</body>
