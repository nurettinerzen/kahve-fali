<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Çiftler Düellosu</title>
<style>
  :root {
    --zemin: #17110f;
    --kart: #241a17;
    --kart-2: #2f2320;
    --cizgi: #3d2e29;
    --metin: #f3e7e1;
    --soluk: #a89189;
    --vurgu: #e8705a;
    --vurgu-2: #f0b429;
    --yesil: #5fb98f;
    --sari: #d9a441;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--zemin);
    color: var(--metin);
    font: 16px/1.5 ui-rounded, -apple-system, "SF Pro Rounded", system-ui, sans-serif;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #uygulama { width: 100%; max-width: 460px; padding: 20px 18px 40px; }

  h1 { font-size: 26px; margin: 0 0 6px; letter-spacing: -0.3px; }
  h2 { font-size: 20px; margin: 0 0 4px; letter-spacing: -0.2px; }
  p.alt { color: var(--soluk); margin: 0 0 22px; font-size: 14px; }

  .kart { background: var(--kart); border: 1px solid var(--cizgi); border-radius: 18px; padding: 18px; margin-bottom: 14px; }

  label { display: block; font-size: 13px; color: var(--soluk); margin: 0 0 6px; }
  input[type=text] {
    width: 100%; padding: 14px 15px; font-size: 17px; font-family: inherit;
    background: var(--kart-2); color: var(--metin);
    border: 1px solid var(--cizgi); border-radius: 13px; outline: none;
  }
  input[type=text]:focus { border-color: var(--vurgu); }
  input.kod { text-transform: uppercase; letter-spacing: 6px; text-align: center; font-size: 24px; font-weight: 600; }

  button {
    width: 100%; padding: 15px; font: 600 16px/1 inherit; font-family: inherit;
    background: var(--vurgu); color: #fff; border: 0; border-radius: 13px;
    cursor: pointer; margin-top: 10px;
  }
  button:disabled { opacity: .4; cursor: default; }
  button.ikincil { background: transparent; color: var(--soluk); border: 1px solid var(--cizgi); }

  .ayrac { text-align: center; color: var(--soluk); font-size: 13px; margin: 18px 0; }

  .ust { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; font-size: 13px; color: var(--soluk); }
  .rozet { background: var(--kart-2); border: 1px solid var(--cizgi); border-radius: 99px; padding: 5px 12px; }

  .ilerleme { display: flex; gap: 5px; margin-bottom: 20px; }
  .ilerleme i { flex: 1; height: 4px; border-radius: 99px; background: var(--cizgi); }
  .ilerleme i.dolu { background: var(--vurgu); }

  .soru { font-size: 23px; font-weight: 600; line-height: 1.35; margin: 0 0 20px; letter-spacing: -0.3px; }

  .sik {
    display: block; width: 100%; text-align: left; padding: 16px;
    background: var(--kart); border: 1px solid var(--cizgi); border-radius: 14px;
    color: var(--metin); font: 16px/1.4 inherit; font-family: inherit; margin: 0 0 10px; cursor: pointer;
  }
  .sik.secili { border-color: var(--vurgu); background: var(--kart-2); }

  .kod-kutu { text-align: center; padding: 26px 18px; }
  .kod-kutu .kod { font-size: 46px; font-weight: 700; letter-spacing: 10px; color: var(--vurgu-2); margin: 8px 0 4px; }

  .bekle { text-align: center; padding: 40px 20px; color: var(--soluk); }
  .nokta { display: inline-block; animation: zipla 1.2s infinite; }
  .nokta:nth-child(2) { animation-delay: .15s; }
  .nokta:nth-child(3) { animation-delay: .3s; }
  @keyframes zipla { 0%, 60%, 100% { opacity: .25 } 30% { opacity: 1 } }

  .satir { border-bottom: 1px solid var(--cizgi); padding: 15px 0; }
  .satir:last-child { border-bottom: 0; }
  .satir .s { font-size: 14px; color: var(--soluk); margin-bottom: 9px; }
  .cift { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .kutu { background: var(--kart-2); border-radius: 11px; padding: 10px 11px; }
  .kutu .k { font-size: 11px; color: var(--soluk); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .kutu .d { font-size: 15px; line-height: 1.35; }
  .isaret { font-size: 13px; font-weight: 600; margin-top: 8px; }
  .tam { color: var(--yesil); }
  .yakin { color: var(--sari); }
  .uzak { color: var(--soluk); }

  .skor { display: flex; gap: 12px; margin-bottom: 16px; }
  .skor > div { flex: 1; background: var(--kart-2); border-radius: 14px; padding: 14px; text-align: center; }
  .skor .ad { font-size: 13px; color: var(--soluk); }
  .skor .p { font-size: 30px; font-weight: 700; letter-spacing: -1px; }

  .hata { background: #46201c; border: 1px solid #6b322b; color: #ffd9d2; padding: 12px 14px; border-radius: 12px; font-size: 14px; margin-bottom: 14px; }
</style>
</head>
<body>
<div id="uygulama"></div>

<script>
const $ = document.getElementById("uygulama");
const kacis = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

let oturum = null;      // {kod, oyuncu, token}
let durum = null;       // sunucudan gelen durum
let indeks = 0;         // ekranda kaçıncı soru
let taslak = "";        // yazılan/seçilen cevap
let hata = "";
let zamanlayici = null;

try { oturum = JSON.parse(localStorage.getItem("duello-oturum") || "null"); } catch {}

// ─────────────────────────────────────────── sunucu
async function istek(yol, secenekler = {}) {
  const ayirac = yol.includes("?") ? "&" : "?";
  const kimlik = oturum ? `${ayirac}kod=${oturum.kod}&oyuncu=${oturum.oyuncu}&token=${oturum.token}` : "";
  const y = await fetch(yol + (yol.startsWith("/api/kur") || yol.startsWith("/api/katil") ? "" : kimlik), {
    method: secenekler.govde ? "POST" : "GET",
    headers: { "content-type": "application/json" },
    body: secenekler.govde ? JSON.stringify(secenekler.govde) : undefined,
  });
  const veri = await y.json();
  if (!y.ok) throw new Error(veri.hata || "Bir şeyler ters gitti.");
  return veri;
}

// Ekranı etkileyen şeylerin özeti. Değişmediyse yeniden çizmeyiz —
// yoksa eşin her cevabında input yeniden yaratılır, imleç kaybolur.
const ekranAnahtari = (d) =>
  d ? JSON.stringify([d.faz, d.seviye, d.esBitirdi, d.hazir, !!d.secenekler, d.es?.ad]) : "";

async function tazele() {
  if (!oturum) return;
  try {
    const yeni = await istek("/api/durum");
    if (durum && yeni.kod === durum.kod && yeni.v < durum.v) return; // geciken eski yanıt, çöpe
    const fazDegisti = !durum || durum.faz !== yeni.faz;
    const cizGerek = ekranAnahtari(durum) !== ekranAnahtari(yeni);
    durum = yeni;
    if (fazDegisti) { indeks = ilkBosSoru(); taslak = ""; }
    if (cizGerek) ciz();
  } catch (e) {
    oturum = null;
    localStorage.removeItem("duello-oturum");
    hata = e.message;
    ciz();
  }
}

function anketBaslat() {
  clearInterval(zamanlayici);
  zamanlayici = setInterval(tazele, 2000);
}

function ilkBosSoru() {
  if (!durum) return 0;
  const liste = durum.faz === "tahmin" ? durum.benimTahminlerim : durum.benimCevaplarim;
  for (let i = 0; i < durum.soruSayisi; i++) if (!liste?.[i]) return i;
  return durum.soruSayisi;
}

// ─────────────────────────────────────────── eylemler
async function odaKur(ad) {
  oturum = await istek("/api/kur", { govde: { ad } });
  localStorage.setItem("duello-oturum", JSON.stringify(oturum));
  await tazele();
  anketBaslat();
}

async function odayaKatil(kod, ad) {
  oturum = await istek("/api/katil", { govde: { kod, ad } });
  localStorage.setItem("duello-oturum", JSON.stringify(oturum));
  await tazele();
  anketBaslat();
}

async function gonder() {
  if (!taslak.trim()) return;
  const yol = durum.faz === "tahmin" ? "/api/tahmin" : "/api/cevap";
  const gecici = taslak;
  taslak = "";
  try {
    durum = await istek(yol, { govde: { indeks, metin: gecici } });
    indeks = ilkBosSoru();
    ciz();
  } catch (e) { hata = e.message; taslak = gecici; ciz(); }
}

async function hazirim() {
  try { durum = await istek("/api/hazir", { govde: {} }); ciz(); }
  catch (e) { hata = e.message; ciz(); }
}

function cik() {
  localStorage.removeItem("duello-oturum");
  oturum = null; durum = null; clearInterval(zamanlayici); ciz();
}

// ─────────────────────────────────────────── ekranlar
function ciz() {
  const hataHtml = hata ? `<div class="hata">${kacis(hata)}</div>` : "";
  hata = "";

  if (!oturum || !durum) return girisEkrani(hataHtml);
  if (durum.faz === "lobi") return lobiEkrani(hataHtml);
  if (durum.faz === "hazirlaniyor") return bekleEkrani("Sorular hazırlanıyor", "Eşinin cevaplarına göre şıklar üretiliyor.");
  if (durum.faz === "sonuc") return sonucEkrani(hataHtml);

  const bitti = indeks >= durum.soruSayisi;
  if (bitti) {
    const esBekleniyor = durum.faz === "tahmin" ? !durum.esBitirdi.tahmin : !durum.esBitirdi.cevap;
    if (esBekleniyor) {
      return bekleEkrani(
        `${durum.es?.ad ?? "Eşin"} henüz bitirmedi`,
        "Sen bitirdin. O da bitirince ekran kendiliğinden ilerleyecek — beklemek zorunda değilsin."
      );
    }
    return bekleEkrani("Hazırlanıyor", "");
  }
  return soruEkrani(hataHtml);
}

function girisEkrani(hataHtml) {
  $.innerHTML = `
    <h1>Çiftler Düellosu</h1>
    <p class="alt">Birbirinizi ne kadar tanıyorsunuz? Her bölüm biraz daha derinleşiyor.</p>
    ${hataHtml}
    <div class="kart">
      <label>Adın</label>
      <input type="text" id="ad" placeholder="Örn. Nurettin" autocomplete="given-name" />
      <button id="kurBtn">Yeni oyun kur</button>
    </div>
    <div class="ayrac">— ya da eşin kurduysa —</div>
    <div class="kart">
      <label>Oda kodu</label>
      <input type="text" id="kod" class="kod" maxlength="4" placeholder="····" autocapitalize="characters" autocomplete="off" />
      <button id="katilBtn" class="ikincil">Odaya katıl</button>
    </div>`;

  const adAl = () => document.getElementById("ad").value.trim();
  document.getElementById("kurBtn").onclick = async (e) => {
    if (!adAl()) return uyar("Önce adını yaz.");
    e.target.disabled = true;
    try { await odaKur(adAl()); } catch (err) { hata = err.message; ciz(); }
  };
  document.getElementById("katilBtn").onclick = async (e) => {
    const kod = document.getElementById("kod").value.trim();
    if (!adAl()) return uyar("Önce adını yaz.");
    if (kod.length !== 4) return uyar("4 haneli oda kodunu gir.");
    e.target.disabled = true;
    try { await odayaKatil(kod, adAl()); } catch (err) { hata = err.message; ciz(); }
  };
}

const uyar = (m) => { hata = m; ciz(); };

function lobiEkrani(hataHtml) {
  $.innerHTML = `
    ${hataHtml}
    <div class="kart kod-kutu">
      <div style="color:var(--soluk);font-size:14px">Eşine bu kodu ver</div>
      <div class="kod">${kacis(durum.kod)}</div>
      <div style="color:var(--soluk);font-size:13px">Aynı adresi açıp bu kodu girsin.</div>
    </div>
    <div class="bekle"><span class="nokta">●</span> <span class="nokta">●</span> <span class="nokta">●</span><br><br>Eşin bekleniyor…</div>
    <button class="ikincil" id="cikBtn">Vazgeç</button>`;
  document.getElementById("cikBtn").onclick = cik;
}

function bekleEkrani(baslik, alt) {
  $.innerHTML = `
    ${ustHtml()}
    <div class="bekle">
      <span class="nokta">●</span> <span class="nokta">●</span> <span class="nokta">●</span>
      <h2 style="margin-top:18px">${kacis(baslik)}</h2>
      <p class="alt" style="margin-top:8px">${kacis(alt)}</p>
    </div>`;
}

function ustHtml() {
  const fazAd = durum.faz === "tahmin" ? "Tahmin" : durum.faz === "sonuc" ? "Yüzleşme" : "Kendi cevabın";
  return `<div class="ust">
    <span class="rozet">Bölüm ${durum.seviye} · ${kacis(durum.seviyeAd)}</span>
    <span>${kacis(fazAd)}</span>
  </div>`;
}

function soruEkrani(hataHtml) {
  const tahminMi = durum.faz === "tahmin";
  const soru = durum.sorular[indeks];
  const esAd = durum.es?.ad ?? "Eşin";

  const baslik = tahminMi
    ? `<p class="alt" style="margin-bottom:14px">${kacis(esAd)} bu soruya ne yazdı?</p>`
    : `<p class="alt" style="margin-bottom:14px">${kacis(durum.seviyeAlt)}</p>`;

  const noktalar = Array.from({ length: durum.soruSayisi }, (_, i) => `<i class="${i < indeks ? "dolu" : ""}"></i>`).join("");

  let girisHtml;
  if (tahminMi && durum.tip === "sik" && durum.secenekler) {
    girisHtml = durum.secenekler[indeks]
      .map((s) => `<button class="sik" data-deger="${kacis(s)}">${kacis(s)}</button>`)
      .join("");
  } else {
    girisHtml = `
      <input type="text" id="cevap" placeholder="${tahminMi ? "Tahminini yaz" : "Cevabını yaz"}" autocomplete="off" value="${kacis(taslak)}" />
      <button id="ileriBtn">${indeks === durum.soruSayisi - 1 ? "Bitir" : "İleri"}</button>`;
  }

  $.innerHTML = `
    ${ustHtml()}
    <div class="ilerleme">${noktalar}</div>
    ${hataHtml}
    ${baslik}
    <div class="soru">${kacis(soru)}</div>
    ${girisHtml}`;

  if (tahminMi && durum.tip === "sik" && durum.secenekler) {
    $.querySelectorAll(".sik").forEach((b) => {
      b.onclick = () => { taslak = b.dataset.deger; gonder(); };
    });
  } else {
    const alan = document.getElementById("cevap");
    alan.oninput = () => { taslak = alan.value; };
    alan.onkeydown = (e) => { if (e.key === "Enter") gonder(); };
    document.getElementById("ileriBtn").onclick = gonder;
    alan.focus();
    alan.setSelectionRange(alan.value.length, alan.value.length); // imleç sona
  }
}

function sonucEkrani(hataHtml) {
  const s = durum.sonuc;
  const esAd = durum.es?.ad ?? "Eşin";
  const benAd = durum.ben.ad;
  const puanla = (kademeler) => (kademeler ?? []).reduce((t, k) => t + (k === "tam" ? 10 : k === "yakin" ? 5 : 0), 0);
  const puansiz = durum.tip === "acik";

  const isaretMetni = { tam: "Bildin", yakin: "Yaklaştın", uzak: "Bilemedin" };

  const satirlar = durum.sorular.map((soru, i) => {
    const benimKademe = s.benimKademelerim?.[i];
    const esinKademe = s.esinKademeleri?.[i];
    return `
      <div class="satir">
        <div class="s">${kacis(soru)}</div>
        <div class="cift">
          <div class="kutu">
            <div class="k">${kacis(benAd)}</div>
            <div class="d">${kacis(s.benimCevaplarim[i] || "—")}</div>
          </div>
          <div class="kutu">
            <div class="k">${kacis(esAd)}</div>
            <div class="d">${kacis(s.esinCevaplari[i] || "—")}</div>
          </div>
        </div>
        ${puansiz ? "" : `
        <div class="isaret ${benimKademe}">
          Senin tahminin: “${kacis(s.benimTahminlerim[i] || "—")}” · ${isaretMetni[benimKademe] ?? ""}
        </div>
        <div class="isaret ${esinKademe}">
          ${kacis(esAd)} seni tahmin etti: “${kacis(s.esinTahminleri[i] || "—")}” · ${isaretMetni[esinKademe] ?? ""}
        </div>`}
      </div>`;
  }).join("");

  const skorHtml = puansiz ? "" : `
    <div class="skor">
      <div><div class="ad">${kacis(benAd)}</div><div class="p">${puanla(s.benimKademelerim)}</div></div>
      <div><div class="ad">${kacis(esAd)}</div><div class="p">${puanla(s.esinKademeleri)}</div></div>
    </div>`;

  const beklemede = durum.hazir?.[durum.ben.no] && !durum.hazir?.[1 - durum.ben.no];
  const dugmeMetni = durum.sonSeviye ? "Yeniden oyna" : "Sonraki bölüme geç";

  $.innerHTML = `
    ${ustHtml()}
    ${hataHtml}
    <h2>${puansiz ? "Yüzleşme" : "Bölüm bitti"}</h2>
    <p class="alt">${kacis(durum.seviyeAlt)}</p>
    ${skorHtml}
    <div class="kart">${satirlar}</div>
    ${beklemede
      ? `<div class="bekle" style="padding:16px">${kacis(esAd)} hazır olunca geçiyoruz…</div>`
      : `<button id="hazirBtn">${dugmeMetni}</button>`}`;

  const btn = document.getElementById("hazirBtn");
  if (btn) btn.onclick = () => { btn.disabled = true; hazirim(); };
}

// ─────────────────────────────────────────── başlat
if (oturum) { tazele().then(anketBaslat); } else { ciz(); }
</script>
</body>
</html>
