<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Su Sıralama</title>
<style>
  :root{ --bg:#0f1220; --panel:#1a1f36; --ink:#eef1ff; --muted:#9aa3c7; --accent:#4cc2ff; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #1c2547, var(--bg));
    color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center; min-height:100%;
    user-select:none;
  }
  header{ width:100%; max-width:520px; padding:18px 20px 6px; display:flex; align-items:center; justify-content:space-between; }
  h1{ font-size:20px; margin:0; letter-spacing:.3px; }
  h1 span{ color:var(--accent); }
  .stats{ display:flex; gap:16px; font-size:13px; color:var(--muted); }
  .stats b{ color:var(--ink); font-weight:600; }
  #board{
    flex:1; width:100%; max-width:520px; display:flex; flex-wrap:wrap; align-content:center;
    justify-content:center; gap:16px 22px; padding:20px; touch-action:manipulation;
  }
  .tube{
    width:52px; height:196px; border:3px solid #33406e; border-top:none;
    border-radius:6px 6px 26px 26px; background:rgba(255,255,255,.03);
    display:flex; flex-direction:column-reverse; overflow:hidden; cursor:pointer;
    transition:transform .12s ease; position:relative;
  }
  .tube.sel{ transform:translateY(-14px); border-color:var(--accent); box-shadow:0 0 0 2px rgba(76,194,255,.35); }
  .seg{ height:46px; width:100%; transition:height .15s ease; }
  .controls{ display:flex; gap:12px; padding:10px 0 26px; }
  button{
    background:var(--panel); color:var(--ink); border:1px solid #33406e; border-radius:12px;
    padding:11px 18px; font-size:14px; font-weight:600; cursor:pointer;
  }
  button:active{ transform:scale(.96); }
  button.primary{ background:var(--accent); color:#04263a; border-color:transparent; }
  .overlay{
    position:fixed; inset:0; background:rgba(6,9,20,.72); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:5;
  }
  .overlay.on{ display:flex; }
  .card{ background:var(--panel); border:1px solid #33406e; border-radius:20px; padding:28px 30px; text-align:center; max-width:300px; }
  .card h2{ margin:0 0 6px; font-size:24px; }
  .card p{ color:var(--muted); margin:0 0 20px; }
</style>
</head>
<body>
  <header>
    <h1>Su <span>Sıralama</span></h1>
    <div class="stats"><div>Bölüm <b id="lvl">1</b></div><div>Hamle <b id="mv">0</b></div></div>
  </header>
  <div id="board"></div>
  <div class="controls">
    <button id="undo">↶ Geri Al</button>
    <button id="reset">Sıfırla</button>
    <button id="new" class="primary">Yeni Bölüm</button>
  </div>
  <div class="overlay" id="win">
    <div class="card">
      <h2>Tebrikler! 🎉</h2>
      <p id="wintxt">Bölümü çözdün.</p>
      <button class="primary" id="next">Sonraki Bölüm →</button>
    </div>
  </div>
<script>
const COLORS=['#e6194b','#3cb44b','#ffe119','#4363d8','#f58231','#a24bff','#2ee6c8','#f032e6','#bcf60c','#ff8fb0','#00a0a0','#c98a3a'];
const CAP=4;
let level=1, tubes=[], selected=-1, moves=0, history=[];

function colorsForLevel(l){ return Math.min(3 + Math.floor((l-1)/1)*1 + (l>1?0:0), COLORS.length); }
// difficulty: level 1 -> 3 colors, +1 color every level up to 12
function numColors(l){ return Math.min(2 + l, COLORS.length); }

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function genLevel(l){
  const n = numColors(l);
  let pool=[];
  for(let c=0;c<n;c++) for(let k=0;k<CAP;k++) pool.push(c);
  let t;
  let tries=0;
  do{
    shuffle(pool);
    t=[];
    for(let c=0;c<n;c++) t.push(pool.slice(c*CAP,c*CAP+CAP));
    t.push([]); t.push([]); // two empty tubes
    tries++;
  } while(isSolved(t) && tries<20);
  return t;
}

function topColor(tube){ return tube.length? tube[tube.length-1] : -1; }
function isUniform(tube){ return tube.length===0 || (tube.length===CAP && tube.every(x=>x===tube[0])); }
function isSolved(t){ return t.every(isUniform); }

function canPour(from,to){
  const a=tubes[from], b=tubes[to];
  if(from===to || a.length===0 || b.length===CAP) return false;
  return b.length===0 || topColor(a)===topColor(b);
}
function pour(from,to){
  const a=tubes[from], b=tubes[to];
  const col=topColor(a);
  while(a.length>0 && topColor(a)===col && b.length<CAP){ b.push(a.pop()); }
}

function render(){
  const board=document.getElementById('board');
  board.innerHTML='';
  tubes.forEach((tube,i)=>{
    const el=document.createElement('div');
    el.className='tube'+(i===selected?' sel':'');
    for(let k=0;k<tube.length;k++){
      const s=document.createElement('div');
      s.className='seg';
      s.style.background=COLORS[tube[k]];
      el.appendChild(s);
    }
    el.onclick=()=>tap(i);
    board.appendChild(el);
  });
  document.getElementById('lvl').textContent=level;
  document.getElementById('mv').textContent=moves;
}

function tap(i){
  if(selected===-1){ if(tubes[i].length) selected=i; }
  else if(selected===i){ selected=-1; }
  else if(canPour(selected,i)){
    history.push(JSON.stringify(tubes));
    pour(selected,i); moves++; selected=-1;
    if(isSolved(tubes)) setTimeout(win,220);
  } else { selected = tubes[i].length? i : -1; }
  render();
}

function win(){
  document.getElementById('wintxt').textContent=`Bölüm ${level} tamam · ${moves} hamle`;
  document.getElementById('win').classList.add('on');
}
function startLevel(l){
  level=l; tubes=genLevel(l); selected=-1; moves=0; history=[];
  document.getElementById('win').classList.remove('on');
  render();
}

document.getElementById('undo').onclick=()=>{ if(history.length){ tubes=JSON.parse(history.pop()); moves=Math.max(0,moves-1); selected=-1; render(); } };
document.getElementById('reset').onclick=()=>startLevel(level);
document.getElementById('new').onclick=()=>startLevel(level+1);
document.getElementById('next').onclick=()=>startLevel(level+1);

startLevel(1);
</script>
</body>
</html>
