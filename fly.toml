# Çiftler Düellosu — Fly.io yapılandırması
# Deploy: fly launch --copy-config --no-deploy  (ilk sefer), sonra fly deploy
# API anahtarı: fly secrets set ANTHROPIC_API_KEY=sk-...

app = "ciftler-duello"
primary_region = "fra"   # Frankfurt — Türkiye'ye en yakın bölge

[build]
  dockerfile = "Dockerfile.duello"

[env]
  PORT = "8791"
  VERI_DIZINI = "/data"   # odalar kalıcı diske yazılır

[mounts]
  source = "duello_veri"
  destination = "/data"

[http_service]
  internal_port = 8791
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
